name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The bridge runs on macOS (launchd) and Linux (systemd); test on both.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n daemon/uninstall.sh
          bash -n scripts/lib/platform.sh
          bash -n tests/test_platform_detection.sh
          for s in examples/allowed_scripts/*.sh; do bash -n "$s"; done

      - name: Platform detection tests
        if: runner.os == 'Linux'
        run: bash tests/test_platform_detection.sh

      - name: Tests
        run: pytest -q

  wsl-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # WSL starts in $HOME, not the Windows workspace — map path and cd first.

      - name: WSL syntax check and environment
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # pwsh eats backslashes before native exe args; forward slashes work with wslpath.
          $winPath = "$env:GITHUB_WORKSPACE" -replace '\\', '/'
          $repo = (wsl.exe wslpath -a $winPath).Trim()
          if (-not $repo) { throw "wslpath failed for: $winPath" }
          Write-Host "WSL repo path: $repo"
          wsl.exe bash -lc "cd '$repo' && sed -i 's/\r$//' install.sh scripts/lib/platform.sh && bash -n install.sh && bash -n scripts/lib/platform.sh && grep -qiE 'microsoft|wsl' /proc/version && echo WSL detected"
