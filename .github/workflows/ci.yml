name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The bridge runs on macOS (launchd) and Linux (systemd); test on both.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n daemon/uninstall.sh
          bash -n scripts/lib/platform.sh
          bash -n scripts/ci-wsl-smoke.sh
          bash -n tests/test_platform_detection.sh
          for s in examples/allowed_scripts/*.sh; do bash -n "$s"; done

      - name: Platform detection tests
        if: runner.os == 'Linux'
        run: bash tests/test_platform_detection.sh

      - name: Tests
        run: pytest -q

  wsl-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # GHA windows runners enable WSL but ship NO Linux distro by default.
      # wsl.exe wslpath then prints "no installed distributions" to stdout (not a path).
      # See: https://github.com/actions/runner-images/issues/12646
      - name: Install WSL Ubuntu
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-22.04
          set-as-default: true

      # setup-wsl registers shell "wsl-bash" (not wsl-shell-<distro>). See Vampire/setup-wsl README.
      - name: WSL syntax check and environment
        shell: wsl-bash
        run: bash scripts/ci-wsl-smoke.sh
