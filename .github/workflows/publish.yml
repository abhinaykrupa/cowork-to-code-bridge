name: Publish to PyPI

# Publishes the package to PyPI when you push a version tag (e.g. v0.5.1),
# or manually via the Actions tab. Uses PyPI Trusted Publishing (OIDC) — no
# token to store IF you configure a trusted publisher on PyPI (recommended).
# Otherwise, add a PYPI_API_TOKEN repo secret and uncomment the password line.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the dist
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If NOT using Trusted Publishing, add this and set the secret:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
